<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>교육운영 DX/AX PoC</title>
  <style>
    :root {
      --line: rgba(20, 34, 29, 0.16);
      --green: #1d6f5f;
      --blue: #255f9f;
      --deep: #10243f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: transparent;
      font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
    }

    body {
      padding: 0;
    }

    .entry-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .entry {
      min-height: 48px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      background: linear-gradient(135deg, var(--green), var(--blue));
      text-align: center;
      text-decoration: none;
      font-size: clamp(13px, 1.5vw, 16px);
      font-weight: 900;
      line-height: 1.25;
      letter-spacing: 0;
      transition: transform 160ms ease, filter 160ms ease;
    }

    .entry:hover,
    .entry:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.05);
      outline: none;
    }

    .entry:nth-child(2) {
      background: linear-gradient(135deg, #114f8a, #1f6f66);
    }

    .entry:nth-child(3) {
      background: linear-gradient(135deg, var(--deep), #245b91);
    }

    @media (max-width: 720px) {
      .entry-grid {
        grid-template-columns: 1fr;
      }

      .entry {
        min-height: 44px;
      }
    }
  </style>
</head>
<body>
  <nav class="entry-grid" aria-label="PoC 프로젝트 바로가기">
    <a class="entry" href="https://1001careerdirector.github.io/greenartswSC_V1/" target="_blank" rel="noopener">통합 스케줄 대시보드</a>
    <a class="entry" href="https://1001careerdirector.github.io/greenartswTEST_V1/" target="_blank" rel="noopener">현장평가준비 진척도 대시보드</a>
    <a class="entry" href="https://1001careerdirector.github.io/greenartswDS_V1/" target="_blank" rel="noopener">디자인시스템</a>
  </nav>
</body>
</html>
