<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>교육운영 DX/AX PoC</title>
  <style>
    :root {
      --bg: #f4f7f4;
      --ink: #14221d;
      --muted: #5d6b66;
      --line: rgba(20, 34, 29, 0.14);
      --glass: rgba(255, 255, 255, 0.78);
      --green: #1d6f5f;
      --blue: #255f9f;
      --deep: #10243f;
      --shadow: 0 16px 42px rgba(27, 45, 40, 0.13);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(29, 111, 95, 0.12), transparent 30%),
        linear-gradient(315deg, rgba(37, 95, 159, 0.15), transparent 32%),
        var(--bg);
    }

    body {
      min-height: 100vh;
      padding: 8px;
      display: grid;
      place-items: center;
    }

    .stage {
      width: min(1120px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--glass);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      padding: clamp(14px, 2.4vw, 24px);
    }

    .topline {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .eyebrow {
      margin: 0 0 3px;
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3.2vw, 38px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .entry-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .entry {
      min-height: 92px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      background: linear-gradient(135deg, var(--green), var(--blue));
      text-align: center;
      text-decoration: none;
      font-size: clamp(15px, 1.8vw, 20px);
      font-weight: 900;
      line-height: 1.35;
      box-shadow: 0 10px 24px rgba(20, 34, 29, 0.14);
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
    }

    .entry:hover,
    .entry:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(20, 34, 29, 0.2);
      filter: brightness(1.04);
      outline: none;
    }

    .entry:nth-child(2) {
      background: linear-gradient(135deg, #114f8a, #1f6f66);
    }

    .entry:nth-child(3) {
      background: linear-gradient(135deg, var(--deep), #245b91);
    }

    @media (max-width: 720px) {
      body {
        padding: 6px;
        place-items: stretch;
      }

      .stage {
        display: grid;
        align-content: center;
      }

      .topline {
        display: block;
      }

      .entry-grid {
        grid-template-columns: 1fr;
      }

      .entry {
        min-height: 68px;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="교육운영 DX AX PoC 진입 화면">
    <header class="topline">
      <div>
        <p class="eyebrow">그린컴퓨터아카데미 수원</p>
        <h1>교육운영 DX/AX PoC</h1>
      </div>
    </header>

    <nav class="entry-grid" aria-label="PoC 프로젝트 바로가기">
      <a class="entry" href="https://1001careerdirector.github.io/greenartswSC_V1/" target="_blank" rel="noopener">통합 스케줄 대시보드</a>
      <a class="entry" href="https://1001careerdirector.github.io/greenartswTEST_V1/" target="_blank" rel="noopener">현장평가준비 진척도 대시보드</a>
      <a class="entry" href="https://1001careerdirector.github.io/greenartswDS_V1/" target="_blank" rel="noopener">디자인시스템</a>
    </nav>
  </main>
</body>
</html>
