<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>교육운영 DX/AX PoC</title>
  <style>
    :root {
      --line: rgba(20, 34, 29, 0.16);
      --green: #1d6f5f;
      --blue: #255f9f;
      --deep: #10243f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 0;
      background: transparent;
      font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
      overflow: hidden;
    }

    body {
      padding: 0;
    }

    .entry-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: clamp(4px, 0.8vw, 8px);
      overflow: hidden;
    }

    .entry {
      appearance: none;
      min-width: 0;
      width: 100%;
      min-height: min(clamp(38px, 5.6vw, 56px), calc(100dvh - 2px));
      padding: clamp(6px, 1vw, 10px) clamp(6px, 1.4vw, 14px);
      border: 1px solid var(--line);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      background: linear-gradient(135deg, var(--green), var(--blue));
      text-align: center;
      font: inherit;
      font-size: clamp(10px, 1.35vw, 15px);
      font-weight: 900;
      line-height: 1.18;
      letter-spacing: 0;
      word-break: keep-all;
      overflow-wrap: anywhere;
      cursor: pointer;
      transition: transform 160ms ease, filter 160ms ease;
    }

    .label-short {
      display: none;
    }

    .entry:hover,
    .entry:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.05);
      outline: none;
    }

    .entry:nth-child(2) {
      background: linear-gradient(135deg, #114f8a, #1f6f66);
    }

    .entry:nth-child(3) {
      background: linear-gradient(135deg, var(--deep), #245b91);
    }

    .entry.project1 {
      background: linear-gradient(135deg, #6b4c9a, #8a6a2a);
    }

    .entry.project1:nth-child(5) {
      background: linear-gradient(135deg, #4f5d75, #7a5c2e);
    }

    @media (max-width: 640px) {
      .entry-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 3px;
      }

      .entry {
        min-height: min(34px, calc(100dvh - 2px));
        padding: 4px 3px;
        border-radius: 5px;
        font-size: clamp(9px, 2.25vw, 11px);
        line-height: 1.05;
      }

      .label-full {
        display: none;
      }

      .label-short {
        display: inline;
      }
    }
  </style>
</head>
<body>
  <nav class="entry-grid" aria-label="PoC 프로젝트 바로가기">
    <button class="entry" type="button" data-url="https://1001careerdirector.github.io/greenartswSC_V1/"><span class="label-full">통합 스케줄 대시보드</span><span class="label-short">스케줄</span></button>
    <button class="entry" type="button" data-url="https://1001careerdirector.github.io/greenartswTEST_V1/channel_Dashboard.html"><span class="label-full">현장평가준비 진척도 대시보드</span><span class="label-short">현장평가</span></button>
    <button class="entry" type="button" data-url="https://1001careerdirector.github.io/greenartswDS_V1/"><span class="label-full">디자인시스템</span><span class="label-short">디자인</span></button>
    <button class="entry project1" type="button" data-url="./project1-admin.html"><span class="label-full">프로젝트1 성과 리포트(Admin)</span><span class="label-short">성과리포트</span></button>
    <button class="entry project1" type="button" data-url="https://docs.google.com/spreadsheets/d/1isyMSHjnhS4FmSujLdteEHxoFq3oM1yy44rPNIXZSRI/edit?usp=sharing"><span class="label-full">프로젝트1 훈련생 피드백</span><span class="label-short">피드백</span></button>
  </nav>

  <script>
    document.querySelectorAll(".entry[data-url]").forEach((button) => {
      button.addEventListener("click", (event) => {
        event.preventDefault();
        const url = button.dataset.url;
        const opened = window.open(url, "_blank");
        if (opened) {
          opened.opener = null;
        }
      });
    });
  </script>
</body>
</html>
